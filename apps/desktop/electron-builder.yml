appId: com.riftview.desktop
productName: RiftView
directories:
  buildResources: build
  # The build pipeline runs electron-builder from apps/desktop/deploy/ —
  # `pnpm deploy` produces a self-contained tree there with all transitive
  # deps copied flat into deploy/node_modules (electron-builder's app-builder
  # walks pnpm-lock.yaml and silently drops 3-level-deep transitives like
  # `ms` under pnpm's isolated layout, so the deploy step is what gets the
  # tree into a shape app-builder can pack correctly). Writing artifacts
  # to ../dist keeps the output at apps/desktop/dist/ — the path the
  # @release Playwright fixtures already expect.
  output: ../dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: riftview
  target:
    - nsis
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: rift-view
  repo: riftview
