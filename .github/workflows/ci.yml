name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lockfile-guard:
    # Fails fast if package-lock.json has optionalDependencies without
    # resolved entries — catches npm/cli#4828 strips that otherwise only
    # surface as cryptic "Cannot find module '...<platform>.node'" errors
    # on platforms that weren't the install author's.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check lockfile has no stripped platform deps
        run: python3 scripts/check-lockfile-optional-deps.py

  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Guard — @riftview/shared has no electron imports
        # Belt-and-suspenders: the CLI bundle marks electron external, but
        # any electron import in shared source would still bloat esbuild's
        # module graph and risk a runtime require at publish time.
        run: |
          if grep -rnE "from ['\"]electron['\"]|require\(['\"]electron['\"]\)" packages/shared/src; then
            echo "::error::@riftview/shared must not import electron"
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build CLI
        run: npm run build:cli
      - name: CLI bundle smoke — `riftview version --output json`
        run: |
          out=$(node apps/cli/out/index.js version --output json)
          echo "$out"
          echo "$out" | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));if(d.schemaVersion!==1){console.error("bad schemaVersion:",d.schemaVersion);process.exit(1)}'
      - name: CLI phantom-dep guard (pack + install in isolation)
        # Catches the class of failure that commit 7f50643 had to recover
        # from: hoisting-masked runtime deps in apps/cli. Packing all three
        # workspaces (shared, cloud-scan, cli) and installing the tarballs
        # in a fresh directory resolves only what apps/cli declares. If the
        # CLI secretly relies on a package declared only by apps/desktop (or
        # any other non-transitive workspace), this isolated install fails.
        run: |
          set -euo pipefail
          TMPDIR=$(mktemp -d)
          for ws in packages/shared packages/cloud-scan apps/cli; do
            ( cd "$ws" && npm pack --pack-destination "$TMPDIR" )
          done
          cd "$TMPDIR"
          mkdir guard-install && cd guard-install
          npm init -y > /dev/null
          npm install --prefix . \
            "$TMPDIR"/riftview-shared-*.tgz \
            "$TMPDIR"/riftview-cloud-scan-*.tgz \
            "$TMPDIR"/riftview-cli-*.tgz
          node node_modules/@riftview/cli/out/index.js version --output json | \
            node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));if(d.schemaVersion!==1){console.error("guard: bad schemaVersion",d.schemaVersion);process.exit(1)}'
          echo "::notice::CLI resolves with only its declared deps — no phantoms"

  e2e:
    # M2: IPC contract walker. M3: CLI ↔ LocalStack integration.
    # M4 will add Electron E2E; M5 flips release to build-test-publish.
    #
    # LocalStack runs via `docker compose -f .localstack/compose.yml up -d`
    # (the same compose file used for local dev — one source of truth).
    # Docker socket mount in that compose file is what lets the Lambda
    # provider spawn function runtime containers.
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
      - name: Install dependencies
        run: npm ci
      - name: Start LocalStack
        run: docker compose -f .localstack/compose.yml up -d
      - name: Wait for LocalStack
        run: ./scripts/wait-localstack.sh
      - name: Seed LocalStack
        working-directory: apps/cli/tests/integration/fixtures
        run: terraform init -input=false && terraform apply -auto-approve -input=false
      - name: Build CLI
        run: npm run build:cli
      - name: IPC contract
        run: npx vitest run apps/desktop/tests/ipc
      - name: CLI ↔ LocalStack integration
        run: npm run test:integration
      - name: Install Playwright browsers (with Linux deps for xvfb)
        run: npx playwright install --with-deps chromium
      - name: Build desktop for E2E
        run: npm run build --workspace=@riftview/desktop
      - name: Electron E2E smoke (demo mode, xvfb)
        run: xvfb-run -a npm run test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: apps/desktop/tests/e2e/playwright-report
          retention-days: 7
      - name: LocalStack logs on failure
        if: failure()
        run: docker compose -f .localstack/compose.yml logs localstack | tail -200

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fast, e2e]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    # Asymmetric gate:
    #   Linux: full LocalStack-backed @release spec (scan-blast-radius)
    #   macOS: lighter @release-mac spec (demo mode, no LocalStack)
    # macos-latest (macos-15 arm64) can't run Docker — colima can't nested-
    # virtualize on current GHA Apple Silicon runners. The mac spec gates
    # boot + canvas + Inspector which catches mac-specific regressions
    # (signing, ABI, native modules) without needing AWS plumbing.
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # --- Linux-only LocalStack prereqs ---
      - uses: hashicorp/setup-terraform@v3
        if: runner.os == 'Linux'
        with:
          terraform_version: 1.9.x
      - name: Start LocalStack
        if: runner.os == 'Linux'
        run: docker compose -f .localstack/compose.yml up -d
      - name: Wait for LocalStack
        if: runner.os == 'Linux'
        run: ./scripts/wait-localstack.sh
      - name: Seed LocalStack
        if: runner.os == 'Linux'
        working-directory: apps/cli/tests/integration/fixtures
        run: terraform init -input=false && terraform apply -auto-approve -input=false
      # --- Both platforms build the binary + run Playwright ---
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build desktop bundles (electron-vite)
        working-directory: apps/desktop
        run: npx electron-vite build
      - name: Rebuild native modules against Electron ABI
        # Installs Electron-targeted prebuilds for native deps (better-sqlite3).
        # `npm ci` above fetched the Node-ABI prebuilds so the fast job's
        # vitest unit tests can load them. Packaging for Electron requires the
        # ABI matching Electron's bundled Node (v140 on Electron 39); without
        # this step the packaged .node is silently unloadable at runtime and
        # the snapshot history store no-ops (see CLAUDE.md § Native modules).
        working-directory: apps/desktop
        run: npm run rebuild
      - name: Build unsigned binary (for @release E2E)
        working-directory: apps/desktop
        run: npx electron-builder --dir
      - name: Run @release E2E (Linux — full LocalStack)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e:release
        env:
          CI: 'true'
      - name: Run @release E2E (mac — demo-mode smoke)
        if: runner.os == 'macOS'
        run: npm run test:e2e:release:mac
        env:
          CI: 'true'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-release-${{ matrix.platform }}
          path: apps/desktop/tests/e2e/playwright-report
          retention-days: 30
      - name: LocalStack logs on failure
        if: failure() && runner.os == 'Linux'
        run: docker compose -f .localstack/compose.yml logs localstack | tail -200
      # libfuse2 is required for electron-builder's AppImage target on
      # ubuntu-latest (removed from default image; app-builder-bin needs it).
      - name: Install libfuse2 for AppImage (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Build signed and publish
        working-directory: apps/desktop
        run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
