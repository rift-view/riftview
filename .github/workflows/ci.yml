name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudblocks/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: cloudblocks
      - name: Lint
        run: npm run lint
        working-directory: cloudblocks
      - name: Typecheck
        run: npm run typecheck
        working-directory: cloudblocks
      - name: Test
        run: npm test
        working-directory: cloudblocks

  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudblocks/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: cloudblocks
      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        working-directory: cloudblocks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
