name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Guard — @riftview/shared has no electron imports
        # Belt-and-suspenders: the CLI bundle marks electron external, but
        # any electron import in shared source would still bloat esbuild's
        # module graph and risk a runtime require at publish time.
        run: |
          if grep -rnE "from ['\"]electron['\"]|require\(['\"]electron['\"]\)" packages/shared/src; then
            echo "::error::@riftview/shared must not import electron"
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build CLI
        run: npm run build:cli
      - name: CLI bundle smoke — `riftview version --output json`
        run: |
          out=$(node apps/cli/out/index.js version --output json)
          echo "$out"
          echo "$out" | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));if(d.schemaVersion!==1){console.error("bad schemaVersion:",d.schemaVersion);process.exit(1)}'

  e2e:
    # M2: IPC contract walker. M3: CLI ↔ LocalStack integration.
    # M4 will add Electron E2E; M5 flips release to build-test-publish.
    #
    # LocalStack runs via `docker compose -f .localstack/compose.yml up -d`
    # (the same compose file used for local dev — one source of truth).
    # Docker socket mount in that compose file is what lets the Lambda
    # provider spawn function runtime containers.
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x
      - name: Install dependencies
        run: npm ci
      - name: Start LocalStack
        run: docker compose -f .localstack/compose.yml up -d
      - name: Wait for LocalStack
        run: ./scripts/wait-localstack.sh
      - name: Seed LocalStack
        working-directory: apps/cli/tests/integration/fixtures
        run: terraform init -input=false && terraform apply -auto-approve -input=false
      - name: Build CLI
        run: npm run build:cli
      - name: IPC contract
        run: npx vitest run apps/desktop/tests/ipc
      - name: CLI ↔ LocalStack integration
        run: npm run test:integration
      - name: Install Playwright browsers (with Linux deps for xvfb)
        run: npx playwright install --with-deps chromium
      - name: Build desktop for E2E
        run: npm run build --workspace=@riftview/desktop
      - name: Electron E2E smoke (demo mode, xvfb)
        run: xvfb-run -a npm run test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: apps/desktop/tests/e2e/playwright-report
          retention-days: 7
      - name: LocalStack logs on failure
        if: failure()
        run: docker compose -f .localstack/compose.yml logs localstack | tail -200

  release:
    needs: [fast, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
