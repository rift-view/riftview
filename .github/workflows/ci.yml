name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Guard — @riftview/shared has no electron imports
        # Belt-and-suspenders: the CLI bundle marks electron external, but
        # any electron import in shared source would still bloat esbuild's
        # module graph and risk a runtime require at publish time.
        run: |
          if grep -rnE "from ['\"]electron['\"]|require\(['\"]electron['\"]\)" packages/shared/src; then
            echo "::error::@riftview/shared must not import electron"
            exit 1
          fi
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build CLI
        run: npm run build:cli
      - name: CLI bundle smoke — `riftview version --output json`
        run: |
          out=$(node apps/cli/out/index.js version --output json)
          echo "$out"
          echo "$out" | node -e 'const d=JSON.parse(require("fs").readFileSync(0,"utf8"));if(d.schemaVersion!==1){console.error("bad schemaVersion:",d.schemaVersion);process.exit(1)}'

  e2e:
    # Stub for M1. Real content (IPC contract, CLI↔LocalStack, Electron smoke)
    # lands in M2–M4. Duplicating `npm test` proves the job slot is wired
    # correctly and the PR check surface shows two parallel jobs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test

  release:
    needs: [fast, e2e]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build and publish
        run: npx electron-vite build && npx electron-builder --${{ matrix.platform }} --publish always
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
