name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudblocks/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cloudblocks

      - name: Build (electron-vite)
        run: npm run build
        working-directory: cloudblocks

      # Code signing disabled — add CSC_* secrets when Apple dev account is available
      - name: Package macOS app (unsigned)
        run: npm run dist:mac
        working-directory: cloudblocks
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ github.event.head_commit.message || format('Release {0}', github.ref_name) }}
          files: |
            cloudblocks/dist/**/*.dmg
            cloudblocks/dist/mac*/**/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
